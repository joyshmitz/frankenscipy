name: CI Gates (G1-G8)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  # ── G1: Formatting + Linting ──────────────────────────────────────
  g1-lint:
    name: "G1: fmt + clippy"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - run: cargo fmt --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

  # ── G2: Unit + Property Tests ─────────────────────────────────────
  g2-unit-tests:
    name: "G2: unit + property tests"
    needs: g1-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - run: cargo test --workspace -- --nocapture
        timeout-minutes: 5

  # ── G3: Differential Oracle Conformance ───────────────────────────
  # Runs the actual differential test suite (diff_fft, diff_sparse) PLUS
  # golden-journey artifact checks. Per bead frankenscipy-zi0q: G3 was
  # previously golden_journeys + schema_validation only; the real
  # differential_<family>_quota_and_structured_logs tests in lib.rs
  # (exercised via `--test differential`) now also run here.
  g3-conformance:
    name: "G3: differential conformance"
    needs: g2-unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - run: cargo test -p fsci-conformance --test golden_journeys -- --nocapture
        timeout-minutes: 5
      - run: cargo test -p fsci-conformance --test diff_fft -- --nocapture
        timeout-minutes: 5
      - run: cargo test -p fsci-conformance --test diff_sparse -- --nocapture
        timeout-minutes: 5
      - run: cargo test -p fsci-conformance --lib tests::differential -- --nocapture
        timeout-minutes: 10

  # ── G4: Adversarial/Smoke Test ─────────────────────────────────────
  # Runs the conformance smoke test to catch obvious regressions.
  # NOTE: This does NOT replay fuzz/seeds/ — full fuzz corpus replay requires
  # cargo-fuzz with libFuzzer and is too expensive for push CI.
  # Per /testing-fuzzing rule 10, crash artifacts should be converted to
  # deterministic regression tests; this gate runs whatever adversarial
  # regression tests exist in the test suite.
  # TODO(bead:ff7t): Add nightly workflow for full fuzz corpus replay, or
  # create a seed-replay test harness that reads fuzz/seeds/* deterministically.
  g4-adversarial:
    name: "G4: adversarial smoke"
    needs: g2-unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - run: cargo test -p fsci-conformance --test smoke -- --nocapture
        timeout-minutes: 5

  # ── G5: E2E Scenario Orchestration (parallel with G3/G4) ─────────
  # Runs ALL e2e_* integration tests. NO '|| true' suppression — a genuine
  # test failure fails the gate. Per bead frankenscipy-m0cn: previously
  # '|| true' silently swallowed failures in G5, turning it into a log-only
  # step; that is fixed here.
  g5-e2e:
    name: "G5: E2E scenarios"
    needs: g2-unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - run: |
          set -e
          for test in e2e_casp e2e_cluster e2e_fft e2e_interpolate e2e_io \
                      e2e_ivp e2e_linalg e2e_ndimage e2e_optimize \
                      e2e_orchestrator e2e_signal e2e_sparse e2e_spatial \
                      e2e_special e2e_stats; do
            echo "=== Running $test ==="
            cargo test -p fsci-conformance --test "$test" -- --nocapture
          done
        timeout-minutes: 25

  # ── G6: Performance Regression (parallel) ─────────────────────────
  # Runs ALL perf_* targets with real failure propagation (no '|| true').
  # Per bead frankenscipy-rvox: previously only ran 3 of 8 perf tests.
  g6-perf:
    name: "G6: perf regression"
    needs: g2-unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - run: |
          set -e
          for test in perf_arrayapi perf_casp perf_fft perf_ivp \
                      perf_linalg perf_optimize perf_sparse perf_special; do
            echo "=== Running $test ==="
            cargo test -p fsci-conformance --test "$test" -- --nocapture
          done
        timeout-minutes: 20

  # ── G7: Artifact Schema Validation + Evidence Packs (parallel) ────
  # Previously duplicated G3's schema_validation invocation. Now the
  # schema gate is owned solely by G7; G3 handles differential+goldens.
  # Plus G7 runs all evidence_p2c* packs to exercise the end-to-end
  # evidence-bundling pipeline that conformance ships to users.
  g7-schema:
    name: "G7: schema + evidence packs"
    needs: g2-unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - run: cargo test -p fsci-conformance --test schema_validation -- --nocapture
        timeout-minutes: 5
      - run: |
          set -e
          for test in evidence_p2c001 evidence_p2c002 evidence_p2c003 \
                      evidence_p2c004 evidence_p2c005 evidence_p2c006 \
                      evidence_p2c007 evidence_p2c008 evidence_p2c012 \
                      evidence_p2c016; do
            echo "=== Running $test ==="
            cargo test -p fsci-conformance --test "$test" -- --nocapture
          done
        timeout-minutes: 15

  # ── G8: RaptorQ Decode-Proof Verification (parallel) ─────────────
  g8-raptorq:
    name: "G8: RaptorQ proofs"
    needs: g2-unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - run: cargo test -p fsci-conformance --test raptorq_proofs -- --nocapture
        timeout-minutes: 5

  # ── G9: Tolerance Policy Ratchet (parallel) ──────────────────────
  # Lints fixture cases against artifacts/TOLERANCE_POLICY.md §2 baseline tiers.
  # A case is a violation if its rtol exceeds the per-packet baseline AND it
  # carries no `rationale` field. The threshold below is the audit datum from
  # artifacts/tolerance-audit-2026-05-03.md (361 violations at policy
  # publication time).
  #
  # Ratchet protocol: when a fixture is regenerated with a `rationale` for
  # one of its previously-implicit relaxations, the violation count drops.
  # When that drop is observed, lower --max-violations in this step to the
  # new count. The threshold MUST monotonically decrease — never raise it.
  # The eventual goal is --max-violations=0 (full §5 audit-trail compliance).
  g9-tolerance-lint:
    name: "G9: tolerance-policy ratchet"
    needs: g2-unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - run: |
          cargo run --release -p fsci-conformance --bin tolerance_lint -- \
            --max-violations 361
        timeout-minutes: 5
