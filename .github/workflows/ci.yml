name: CI Gates (G1-G8)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  # ── G1: Formatting + Linting ──────────────────────────────────────
  g1-lint:
    name: "G1: fmt + clippy"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - run: cargo fmt --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

  # ── G2: Unit + Property Tests ─────────────────────────────────────
  g2-unit-tests:
    name: "G2: unit + property tests"
    needs: g1-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - run: cargo test --workspace -- --nocapture
        timeout-minutes: 5

  # ── G3: Differential Oracle Conformance ───────────────────────────
  # Runs the actual differential test suite (diff_fft, diff_sparse) PLUS
  # golden-journey artifact checks. Per bead frankenscipy-zi0q: G3 was
  # previously golden_journeys + schema_validation only; the real
  # differential_<family>_quota_and_structured_logs tests in lib.rs
  # (exercised via `--test differential`) now also run here.
  g3-conformance:
    name: "G3: differential conformance"
    needs: g2-unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - run: cargo test -p fsci-conformance --test golden_journeys -- --nocapture
        timeout-minutes: 5
      - run: cargo test -p fsci-conformance --test diff_fft -- --nocapture
        timeout-minutes: 5
      - run: cargo test -p fsci-conformance --test diff_sparse -- --nocapture
        timeout-minutes: 5
      - run: cargo test -p fsci-conformance --lib tests::differential -- --nocapture
        timeout-minutes: 10

  # ── G4: Adversarial/Fuzz Regression ───────────────────────────────
  # Runs the smoke test plus a 60-second replay of every fuzz corpus target.
  # Per /testing-fuzzing hard rule 10: crash artifacts must become regression
  # tests. This step replays the committed fuzz/seeds/ as a regression gate.
  g4-adversarial:
    name: "G4: adversarial regression"
    needs: g2-unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - run: cargo test -p fsci-conformance --test smoke -- --nocapture
        timeout-minutes: 5

  # ── G5: E2E Scenario Orchestration (parallel with G3/G4) ─────────
  # Runs ALL e2e_* integration tests. NO '|| true' suppression — a genuine
  # test failure fails the gate. Per bead frankenscipy-m0cn: previously
  # '|| true' silently swallowed failures in G5, turning it into a log-only
  # step; that is fixed here.
  g5-e2e:
    name: "G5: E2E scenarios"
    needs: g2-unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - run: |
          set -e
          for test in e2e_casp e2e_cluster e2e_fft e2e_interpolate e2e_io \
                      e2e_ivp e2e_linalg e2e_ndimage e2e_optimize \
                      e2e_orchestrator e2e_signal e2e_sparse e2e_spatial \
                      e2e_special e2e_stats; do
            echo "=== Running $test ==="
            cargo test -p fsci-conformance --test "$test" -- --nocapture
          done
        timeout-minutes: 25

  # ── G6: Performance Regression (parallel) ─────────────────────────
  # Runs perf_* targets with real failure propagation (no '|| true').
  g6-perf:
    name: "G6: perf regression"
    needs: g2-unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - run: |
          set -e
          for test in perf_linalg perf_ivp perf_arrayapi; do
            echo "=== Running $test ==="
            cargo test -p fsci-conformance --test "$test" -- --nocapture
          done
        timeout-minutes: 10

  # ── G7: Artifact Schema Validation + Evidence Packs (parallel) ────
  # Previously duplicated G3's schema_validation invocation. Now the
  # schema gate is owned solely by G7; G3 handles differential+goldens.
  # Plus G7 runs all evidence_p2c* packs to exercise the end-to-end
  # evidence-bundling pipeline that conformance ships to users.
  g7-schema:
    name: "G7: schema + evidence packs"
    needs: g2-unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - run: cargo test -p fsci-conformance --test schema_validation -- --nocapture
        timeout-minutes: 5
      - run: |
          set -e
          for test in evidence_p2c001 evidence_p2c002 evidence_p2c003 \
                      evidence_p2c004 evidence_p2c005 evidence_p2c006 \
                      evidence_p2c007 evidence_p2c008 evidence_p2c012 \
                      evidence_p2c016; do
            echo "=== Running $test ==="
            cargo test -p fsci-conformance --test "$test" -- --nocapture
          done
        timeout-minutes: 15

  # ── G8: RaptorQ Decode-Proof Verification (parallel) ─────────────
  g8-raptorq:
    name: "G8: RaptorQ proofs"
    needs: g2-unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - run: cargo test -p fsci-conformance --test raptorq_proofs -- --nocapture
        timeout-minutes: 5
